name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Generate platform folders
        run: flutter create --platforms=android --project-name masjid_alarm_app .

      - name: Force correct applicationId to match Firebase registration
        run: |
          sed -i 's/applicationId = "[^"]*"/applicationId = "com.masjidalarm.app"/' android/app/build.gradle
          sed -i 's/namespace = "[^"]*"/namespace = "com.masjidalarm.app"/' android/app/build.gradle
          echo "--- confirming applicationId and namespace ---"
          grep -E "applicationId|namespace" android/app/build.gradle

      - name: Overwrite settings.gradle with fixed Kotlin + Google Services plugin
        run: |
          cat > android/settings.gradle << 'GRADLE_EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.24" apply false
              id "com.google.gms.google-services" version "4.4.2" apply false
          }

          include ":app"
          GRADLE_EOF
          echo "--- settings.gradle now contains ---"
          cat android/settings.gradle

      - name: Bump Gradle wrapper version
        run: |
          sed -i 's#distributionUrl=.*#distributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-all.zip#' android/gradle/wrapper/gradle-wrapper.properties

      - name: Add Google Services plugin to app module
        run: |
          sed -i '/id "org.jetbrains.kotlin.android"/a\    id "com.google.gms.google-services"' android/app/build.gradle
          echo "--- app/build.gradle plugins block now ---"
          head -n 10 android/app/build.gradle

      - name: Bump minSdkVersion to 23 for Firebase Auth
        run: |
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle
          echo "--- app/build.gradle after minSdk bump ---"
          grep -A2 -B2 "minSdk" android/app/build.gradle

      - name: Place google-services.json
        run: |
          if [ -f "firebase_config/google-services.json" ]; then
            cp firebase_config/google-services.json android/app/google-services.json
            echo "google-services.json copied successfully."
          else
            echo "ERROR: firebase_config/google-services.json not found in repo!"
            echo "Add your Firebase-downloaded google-services.json file to the repo at: firebase_config/google-services.json"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Patch all plugin compileSdk to 34 (avoid corrupted SDK 35 jar on CI)
        run: |
          find "$HOME/.pub-cache" -name "build.gradle" -exec sed -i \
            -e 's/compileSdk[[:space:]]*=\?[[:space:]]*35/compileSdk 34/g' \
            -e 's/compileSdkVersion[[:space:]]*35/compileSdkVersion 34/g' {} +
          find "$HOME/.pub-cache" -name "build.gradle.kts" -exec sed -i \
            -e 's/compileSdk[[:space:]]*=\?[[:space:]]*35/compileSdk = 34/g' {} +

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: masjid-alarm-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
