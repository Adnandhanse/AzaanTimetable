name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Generate platform folders
        run: flutter create --platforms=android --project-name masjid_alarm_app .

      - name: Show settings.gradle before fix (debug)
        run: cat android/settings.gradle

      - name: Bump Kotlin version (robust)
        run: |
          sed -i -E "s/(id [\"']org\.jetbrains\.kotlin\.android[\"'] version )[\"'][^\"']*[\"']/\1\"1.9.24\"/" android/settings.gradle

      - name: Show settings.gradle after fix (debug)
        run: cat android/settings.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: masjid-alarm-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
